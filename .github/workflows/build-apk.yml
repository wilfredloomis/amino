name: Cloud APK Build
run-name: Build ${{ inputs.job_id }} - ${{ inputs.app_name }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Unique job ID generated by the worker"
        required: true
        default: ""
      source_url:
        description: "URL to download the source ZIP"
        required: false
        default: ""
      asset_id:
        description: "GitHub release asset ID"
        required: false
        default: ""
      app_name:
        description: "App display name"
        required: true
        default: "My App"
      package_name:
        description: "Android package name override"
        required: false
        default: ""
      flutter_version:
        description: "Flutter SDK version"
        required: false
        default: "3.29.1"
      build_mode:
        description: "Build mode"
        required: false
        default: "release"
        type: choice
        options:
          - debug
          - release
          - profile
      project_type:
        description: "auto, flutter, react_native, expo, native_android, capacitor, cordova, ionic"
        required: false
        default: "auto"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      APP_NAME: ${{ inputs.app_name }}
      PACKAGE_NAME: ${{ inputs.package_name }}
      BUILD_MODE: ${{ inputs.build_mode }}
      FLUTTER_VERSION: ${{ inputs.flutter_version }}
      PROJECT_DIR: /tmp/project

    steps:
      - name: Set up job
        run: |
          echo "Cloud APK Build Engine"
          echo "Job ID:       ${{ inputs.job_id }}"
          echo "App name:     $APP_NAME"
          echo "Package:      ${PACKAGE_NAME:-<project default>}"
          echo "Build mode:   $BUILD_MODE"
          echo "Project type: ${{ inputs.project_type }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends unzip wget curl jq python3 apksigner zipalign

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download source code
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          mkdir -p /tmp/source_raw "$PROJECT_DIR"
          if [ -n "${{ inputs.asset_id }}" ]; then
            echo "Downloading source from release asset ${{ inputs.asset_id }}"
            curl -L -f --retry 3 --retry-delay 2 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/${{ inputs.asset_id }}" \
              -o /tmp/source_raw/source.zip
          elif [ -n "${{ inputs.source_url }}" ]; then
            echo "Downloading source from URL"
            curl -L -f --retry 3 --retry-delay 2 "${{ inputs.source_url }}" -o /tmp/source_raw/source.zip
          else
            echo "ERROR: No asset_id or source_url provided"
            exit 1
          fi
          unzip -tq /tmp/source_raw/source.zip
          echo "Source ZIP size: $(du -h /tmp/source_raw/source.zip | cut -f1)"

      - name: Clean up staging asset
        if: ${{ inputs.asset_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}"
          RELEASE_INFO=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API/releases?per_page=30" | \
            jq -r --arg aid "${{ inputs.asset_id }}" \
            '.[] | . as $rel | .assets[]? | select(.id == ($aid|tonumber)) | "\($rel.id) \($rel.tag_name)"' \
            2>/dev/null | head -1)
          RELEASE_ID=$(echo "$RELEASE_INFO" | awk '{print $1}')
          RELEASE_TAG=$(echo "$RELEASE_INFO" | awk '{print $2}')

          curl -s -o /dev/null -w "Asset delete HTTP %{http_code}\n" -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API/releases/assets/${{ inputs.asset_id }}" || true
          if [ -n "$RELEASE_ID" ]; then
            curl -s -o /dev/null -w "Release delete HTTP %{http_code}\n" -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$API/releases/$RELEASE_ID" || true
          fi
          if [ -n "$RELEASE_TAG" ]; then
            curl -s -o /dev/null -w "Tag delete HTTP %{http_code}\n" -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$API/git/refs/tags/$RELEASE_TAG" || true
          fi

      - name: Extract source code
        run: |
          rm -rf /tmp/source_raw/extracted "$PROJECT_DIR" /tmp/project_real output
          mkdir -p /tmp/source_raw/extracted "$PROJECT_DIR" output
          unzip -q /tmp/source_raw/source.zip -d /tmp/source_raw/extracted

          TOP=$(ls /tmp/source_raw/extracted | head -1 || true)
          if [ -n "$TOP" ] && [ -d "/tmp/source_raw/extracted/$TOP" ] && [ "$(ls /tmp/source_raw/extracted | wc -l)" -eq 1 ]; then
            cp -a "/tmp/source_raw/extracted/$TOP"/. "$PROJECT_DIR"/
          else
            cp -a /tmp/source_raw/extracted/. "$PROJECT_DIR"/
          fi

          if [ ! -f "$PROJECT_DIR/pubspec.yaml" ] && \
             [ ! -f "$PROJECT_DIR/package.json" ] && \
             [ ! -f "$PROJECT_DIR/build.gradle" ] && \
             [ ! -f "$PROJECT_DIR/build.gradle.kts" ] && \
             [ ! -f "$PROJECT_DIR/settings.gradle" ] && \
             [ ! -f "$PROJECT_DIR/settings.gradle.kts" ]; then
            MARKER=$(find "$PROJECT_DIR" -maxdepth 4 \
              \( -name pubspec.yaml -o -name package.json -o -name settings.gradle -o -name settings.gradle.kts -o -name gradlew \) \
              -not -path "*/node_modules/*" -not -path "*/.dart_tool/*" | head -1)
            if [ -n "$MARKER" ]; then
              REAL_ROOT=$(dirname "$MARKER")
              echo "Relocating project root to $REAL_ROOT"
              mkdir -p /tmp/project_real
              cp -a "$REAL_ROOT"/. /tmp/project_real/
              rm -rf "$PROJECT_DIR"
              mv /tmp/project_real "$PROJECT_DIR"
            fi
          fi

          echo "Project root contents:"
          ls -la "$PROJECT_DIR"

      - name: Patch local Gradle properties for CI
        run: |
          find "$PROJECT_DIR" -name gradle.properties -not -path "*/node_modules/*" | while read -r GP; do
            echo "Patching $GP"
            sed -i '/^org\.gradle\.java\.home\s*=/d' "$GP" || true
            sed -i '/^android\.aapt2FromMavenOverride\s*=/d' "$GP" || true
            sed -i '/^android\.injected\.logSender\.enable\s*=/d' "$GP" || true
            sed -i '/^org\.gradle\.parallel\s*=\s*true/d' "$GP" || true
            grep -q '^org.gradle.jvmargs=' "$GP" || echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError' >> "$GP"
            grep -q '^org.gradle.daemon=' "$GP" || echo 'org.gradle.daemon=false' >> "$GP"
            grep -q '^org.gradle.caching=' "$GP" || echo 'org.gradle.caching=true' >> "$GP"
            grep -q '^android.useAndroidX=' "$GP" || echo 'android.useAndroidX=true' >> "$GP"
            grep -q '^android.enableJetifier=' "$GP" || echo 'android.enableJetifier=true' >> "$GP"
          done

          find "$PROJECT_DIR" -name local.properties -not -path "*/node_modules/*" | while read -r LP; do
            echo "Clearing device-specific paths from $LP"
            sed -i '/^sdk\.dir\s*=/d' "$LP" || true
            sed -i '/^flutter\.sdk\s*=/d' "$LP" || true
            sed -i '/^ndk\.dir\s*=/d' "$LP" || true
          done

      - name: Detect project type
        id: detect
        working-directory: /tmp/project
        run: |
          FORCED_TYPE="${{ inputs.project_type }}"
          if [ -n "$FORCED_TYPE" ] && [ "$FORCED_TYPE" != "auto" ]; then
            TYPE="$FORCED_TYPE"
          elif [ -f pubspec.yaml ]; then
            TYPE="flutter"
          elif [ -f package.json ] && [ -d android ]; then
            TYPE="react_native"
          elif [ -f package.json ] && { [ -f app.json ] || [ -f expo-env.d.ts ] || grep -q '"expo"' package.json 2>/dev/null; }; then
            TYPE="expo"
          elif [ -f package.json ] && grep -q '"@capacitor/\(core\|android\)"' package.json 2>/dev/null; then
            TYPE="capacitor"
          elif [ -f package.json ] && grep -q '"cordova-android"' package.json 2>/dev/null; then
            TYPE="cordova"
          elif [ -f package.json ] && { [ -f ionic.config.json ] || grep -q '"@ionic/' package.json 2>/dev/null; }; then
            TYPE="ionic"
          elif [ -f settings.gradle ] || [ -f settings.gradle.kts ] || [ -f build.gradle ] || [ -f build.gradle.kts ] || [ -f gradlew ]; then
            TYPE="native_android"
          else
            MARKER=$(find . -maxdepth 4 \( -name pubspec.yaml -o -name package.json -o -name gradlew \) -not -path "*/node_modules/*" | head -1)
            case "$MARKER" in
              *pubspec.yaml) TYPE="flutter" ;;
              *package.json) TYPE="react_native" ;;
              *gradlew) TYPE="native_android" ;;
              *) echo "ERROR: Cannot detect project type"; exit 1 ;;
            esac
          fi
          echo "PROJECT_TYPE=$TYPE" >> "$GITHUB_ENV"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Detected project type: $TYPE"

      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Set up Node.js
        if: steps.detect.outputs.type == 'react_native' || steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'capacitor' || steps.detect.outputs.type == 'cordova' || steps.detect.outputs.type == 'ionic'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: >
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Install project SDK and NDK versions
        run: |
          BUILD_FILE=$(find "$PROJECT_DIR" \( -name build.gradle -o -name build.gradle.kts \) -not -path "*/node_modules/*" | head -1 || true)
          if [ -n "$BUILD_FILE" ]; then
            COMPILE_SDK=$(grep -E 'compileSdk(Version)?[[:space:]]*(=|[[:space:]])[[:space:]]*[0-9]+' "$BUILD_FILE" | grep -oE '[0-9]+' | head -1 || true)
            NDK_VER=$(grep -E 'ndkVersion[[:space:]]*(=|[[:space:]])' "$BUILD_FILE" | grep -oE '[0-9]+(\.[0-9]+){2,}' | head -1 || true)
            if [ -n "$COMPILE_SDK" ]; then
              yes | sdkmanager "platforms;android-$COMPILE_SDK" "build-tools;35.0.0" || true
            fi
            if [ -n "$NDK_VER" ]; then
              yes | sdkmanager "ndk;$NDK_VER" || true
            fi
          fi
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ inputs.job_id }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache npm packages
        if: steps.detect.outputs.type == 'react_native' || steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'capacitor' || steps.detect.outputs.type == 'cordova' || steps.detect.outputs.type == 'ionic'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ inputs.job_id }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Patch app name and package name
        working-directory: /tmp/project
        run: |
          if [ -n "$APP_NAME" ]; then
            find . -name strings.xml -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r STRINGS; do
              sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$APP_NAME</string>|g" "$STRINGS" || true
            done
            find . -name AndroidManifest.xml -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r MANIFEST; do
              sed -i "s|android:label=\"[^\"]*\"|android:label=\"$APP_NAME\"|g" "$MANIFEST" || true
              if grep -q 'android:label=' "$MANIFEST"; then
                grep -q 'xmlns:tools=' "$MANIFEST" || sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST" || true
                if grep -q '<application' "$MANIFEST" && ! grep -q 'tools:replace=.*android:label' "$MANIFEST"; then
                  sed -i '0,/<application/s|<application|<application tools:replace="android:label"|' "$MANIFEST" || true
                fi
              fi
            done
          fi

          if [ -n "$PACKAGE_NAME" ]; then
            find . -name AndroidManifest.xml -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r MANIFEST; do
              OLD=$(grep -oP 'package="\K[^"]+' "$MANIFEST" | head -1 || true)
              if [ -n "$OLD" ]; then
                sed -i "s|package=\"$OLD\"|package=\"$PACKAGE_NAME\"|g" "$MANIFEST" || true
              fi
            done
            find . \( -name build.gradle -o -name build.gradle.kts \) -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r GRADLE_FILE; do
              sed -i "s|applicationId[[:space:]]*=.*|applicationId = \"$PACKAGE_NAME\"|g" "$GRADLE_FILE" || true
              sed -i "s|applicationId \".*\"|applicationId \"$PACKAGE_NAME\"|g" "$GRADLE_FILE" || true
              sed -i "s|applicationId '.*'|applicationId '$PACKAGE_NAME'|g" "$GRADLE_FILE" || true
            done
          fi

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 || secrets.SIGNING_KEYSTORE_BASE64 || secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.STORE_PASSWORD || secrets.SIGNING_STORE_PASSWORD || secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || secrets.SIGNING_KEY_ALIAS || secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.SIGNING_KEY_PASSWORD || secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
            STORE_PASS="$KEYSTORE_PASSWORD"
            KEY_PASS="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
            ALIAS="$KEY_ALIAS"
            SIGNING_SOURCE="user secret"
          else
            keytool -genkeypair -v \
              -keystore /tmp/release.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            STORE_PASS="android"
            KEY_PASS="android"
            ALIAS="androiddebugkey"
            SIGNING_SOURCE="generated debug keystore"
          fi
          cat > /tmp/key.properties <<EOF
          storePassword=$STORE_PASS
          keyPassword=$KEY_PASS
          keyAlias=$ALIAS
          storeFile=/tmp/release.keystore
          EOF
          echo "KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD_VALUE=$STORE_PASS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD_VALUE=$KEY_PASS" >> "$GITHUB_ENV"
          echo "KEY_ALIAS_VALUE=$ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_SOURCE=$SIGNING_SOURCE" >> "$GITHUB_ENV"

      - name: Auto-fix Gradle wrapper
        run: |
          find "$PROJECT_DIR" -name gradlew -not -path "*/node_modules/*" -exec chmod +x {} \;
          find "$PROJECT_DIR" -path "*/gradle/wrapper/gradle-wrapper.properties" -not -path "*/node_modules/*" | while read -r WRAPPER_PROPS; do
            sed -i 's|http://services.gradle.org|https://services.gradle.org|g' "$WRAPPER_PROPS"
            GRAD_VER=$(grep -oP 'gradle-\K[0-9.]+(?=-(bin|all)\.zip)' "$WRAPPER_PROPS" | head -1 || true)
            MAJOR=$(echo "$GRAD_VER" | cut -d. -f1)
            MINOR=$(echo "$GRAD_VER" | cut -d. -f2)
            if [ -n "$MAJOR" ] && { [ "$MAJOR" -lt 7 ] || { [ "$MAJOR" -eq 7 ] && [ "${MINOR:-0}" -lt 3 ]; }; }; then
              echo "Upgrading old Gradle wrapper $GRAD_VER to 7.6.4"
              sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-bin.zip|' "$WRAPPER_PROPS"
            fi
          done

      - name: Expo prebuild
        if: steps.detect.outputs.type == 'expo'
        working-directory: /tmp/project
        run: |
          npm install --legacy-peer-deps
          CI=1 npx expo prebuild --platform android --no-install || npx expo-cli eject || true
          npm install --legacy-peer-deps

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          FLUTTER_SDK_PATH=$(dirname "$(dirname "$(which flutter)")")
          ANDROID_SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          mkdir -p android
          printf 'sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=%s\n' "$ANDROID_SDK_PATH" "$FLUTTER_SDK_PATH" "$BUILD_MODE" > android/local.properties
          flutter pub get
          flutter build apk --$BUILD_MODE --target-platform android-arm,android-arm64 --no-shrink
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Build React Native APK
        if: steps.detect.outputs.type == 'react_native'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          npm install --legacy-peer-deps
          cd android
          cp /tmp/key.properties key.properties 2>/dev/null || true
          ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\u&/') -PreactNativeArchitectures=armeabi-v7a,arm64-v8a --no-daemon --stacktrace
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Build Native Android APK
        if: steps.detect.outputs.type == 'native_android' || steps.detect.outputs.type == 'expo'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          find . \( -name build.gradle -o -name build.gradle.kts \) -not -path "*/build/*" -not -path "*/node_modules/*" \
            -exec sed -i -E \
              -e 's/\btestCompile\b/testImplementation/g' \
              -e 's/\bandroidTestCompile\b/androidTestImplementation/g' \
              -e 's/\bcompile\b/implementation/g' \
              -e 's/\bprovided\b/compileOnly/g' \
              -e 's/\bapt\b/annotationProcessor/g' \
            {} \; 2>/dev/null || true

          GRADLEW=$(find . -name gradlew -not -path "*/node_modules/*" | head -1)
          if [ -z "$GRADLEW" ]; then
            echo "ERROR: No Gradle wrapper found"
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLEW")
          PROPS="$GRADLE_DIR/gradle.properties"
          touch "$PROPS"
          sed -i '/org\.gradle\.java\.home\s*=/d' "$PROPS" 2>/dev/null || true
          sed -i '/android\.aapt2FromMavenOverride\s*=/d' "$PROPS" 2>/dev/null || true
          sed -i '/android\.injected\.logSender\.enable\s*=/d' "$PROPS" 2>/dev/null || true
          sed -i '/com\.itsaky\.androidide/d' "$PROPS" 2>/dev/null || true
          sed -i '/\/data\/\(user\|data\)\/[0-9]/d' "$PROPS" 2>/dev/null || true

          WRAPPER_JAR="$GRADLE_DIR/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            mkdir -p "$GRADLE_DIR/gradle/wrapper"
            curl -fsSL -o "$WRAPPER_JAR" https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar || true
          fi

          APP_GRADLE="$GRADLE_DIR/app/build.gradle"
          if [ -f "$APP_GRADLE" ] && ! grep -q "pickFirst" "$APP_GRADLE"; then
            if grep -q "packagingOptions" "$APP_GRADLE"; then
              sed -i "s/packagingOptions[[:space:]]*{/packagingOptions {\n        pickFirst 'lib\/\*\*\/*.so'/" "$APP_GRADLE" || true
            else
              sed -i "s/android[[:space:]]*{/android {\n    packagingOptions {\n        pickFirst 'lib\/\*\*\/*.so'\n    }/" "$APP_GRADLE" || true
            fi
          fi

          cp /tmp/key.properties "$GRADLE_DIR/key.properties" 2>/dev/null || true
          cp /tmp/key.properties "$GRADLE_DIR/../key.properties" 2>/dev/null || true
          cd "$GRADLE_DIR"
          ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\u&/') --no-daemon --stacktrace
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | grep -i universal | head -1 || true)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          fi
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Build Capacitor APK
        if: steps.detect.outputs.type == 'capacitor'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          npm install --legacy-peer-deps
          npm run build || true
          npx cap sync android
          cd android
          ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\u&/') --no-daemon --stacktrace
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Build Cordova APK
        if: steps.detect.outputs.type == 'cordova'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          npm install --legacy-peer-deps
          npx cordova platform add android || true
          npx cordova build android --$BUILD_MODE
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Build Ionic APK
        if: steps.detect.outputs.type == 'ionic'
        working-directory: /tmp/project
        run: |
          set -eo pipefail
          npm install --legacy-peer-deps
          npm run build
          if [ -d android ] || [ -f capacitor.config.ts ] || [ -f capacitor.config.js ] || [ -f capacitor.config.json ]; then
            npx cap sync android
            cd android
            ./gradlew assemble$(echo "$BUILD_MODE" | sed 's/.*/\u&/') --no-daemon --stacktrace
            APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          else
            npx cordova platform add android || true
            npx cordova build android --$BUILD_MODE
            APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          fi
          echo "BUILD_OUTPUT=$(realpath "$APK")" >> "$GITHUB_ENV"

      - name: Show Android failure diagnostics
        if: failure()
        run: |
          echo "=============================="
          echo " Android Build Diagnostics"
          echo "=============================="
          while IFS= read -r REPORT; do
            echo "----- $REPORT -----"
            sed -n '1,320p' "$REPORT"
            echo "----- matching diagnostics -----"
            grep -nE "Error:|ERROR|Merging Errors|uses-sdk|Attribute|Suggestion|tools:replace|android:exported" "$REPORT" || true
          done < <(find "$PROJECT_DIR" -path "*/build/outputs/logs/manifest-merger-*-report.txt" -type f -print)
          while IFS= read -r REPORT; do
            echo "----- $REPORT -----"
            sed -n '1,260p' "$REPORT"
          done < <(find "$PROJECT_DIR" -path "*/build/intermediates/manifest_merge_blame_file/*/*" -type f -print)

      - name: Sign APK
        run: |
          if [ -z "${BUILD_OUTPUT:-}" ] || [ ! -f "$BUILD_OUTPUT" ]; then
            echo "ERROR: Build output APK not found"
            find "$PROJECT_DIR" -name "*.apk" -type f | sort || true
            exit 1
          fi
          mkdir -p output
          ALIGNED="/tmp/aligned.apk"
          SIGNED="/tmp/signed.apk"
          zipalign -v -p 4 "$BUILD_OUTPUT" "$ALIGNED" 2>/dev/null || cp "$BUILD_OUTPUT" "$ALIGNED"
          apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass "pass:$KEYSTORE_PASSWORD_VALUE" \
            --key-pass "pass:$KEY_PASSWORD_VALUE" \
            --ks-key-alias "$KEY_ALIAS_VALUE" \
            --out "$SIGNED" \
            "$ALIGNED"
          apksigner verify "$SIGNED"
          SAFE_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          APK_PATH="output/${SAFE_NAME}_${BUILD_MODE}.apk"
          cp "$SIGNED" "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK_NAME=${SAFE_NAME}_${BUILD_MODE}.apk" >> "$GITHUB_ENV"
          ls -lh output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Cloud APK Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job ID | ${{ inputs.job_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | $APP_NAME |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | ${PACKAGE_NAME:-<project default>} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Type | ${PROJECT_TYPE:-unknown} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | $BUILD_MODE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK | ${APK_NAME:-not created} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signing | ${SIGNING_SOURCE:-unknown} |" >> "$GITHUB_STEP_SUMMARY"
